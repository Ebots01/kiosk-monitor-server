<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Printer Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div class="dashboard">
        <div class="card">
            <h2><span id="kiosk-id">kiosk_ggv_01</span></h2>
            <div id="kiosk-status" class="badge offline">Offline</div>
            
            <div class="hardware-status">
                <p><strong>Wi-Fi:</strong> <span id="wifi-status">Unknown</span></p>
                <p><strong>Printer:</strong> <span id="printer-status">Unknown</span></p>
            </div>
            
            <p class="sync-text" id="sync-status">Awaiting check...</p>
            <button id="poll-btn" onclick="pollKiosk()">Check Status & Sync</button>
        </div>

        <div class="card log-card">
            <h2>Recent Print Jobs</h2>
            <table id="logs-table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Pages</th>
                        <th>Revenue</th>
                    </tr>
                </thead>
                <tbody id="logs-body">
                    <tr><td colspan="3">No logs available</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const socket = io();
        const targetKiosk = "kiosk_ggv_01"; // Must match the ID in your Flutter app

        socket.on('ui_update', (data) => {
            if (data.kioskId !== targetKiosk) return;

            // Update Status Badge
            if (data.status) {
                const statusEl = document.getElementById('kiosk-status');
                statusEl.innerText = data.status;
                statusEl.className = 'badge ' + (data.status === 'Online' ? 'online' : 'offline');
            }

            // Update Hardware Text
            if (data.hardware) {
                document.getElementById('wifi-status').innerText = data.hardware.wifi;
                document.getElementById('printer-status').innerText = data.hardware.printer;
            }

            // Update Sync Text
            if (data.logsSynced !== undefined) {
                document.getElementById('sync-status').innerText = 
                    data.logsSynced > 0 
                    ? `Just synced ${data.logsSynced} new jobs (${data.pagesSynced} pages).`
                    : `Checked successfully. No new print jobs.`;
            }

            document.getElementById('poll-btn').innerText = "Check Status & Sync";
            document.getElementById('poll-btn').disabled = false;
        });

        socket.on('ui_logs_table', (rows) => {
            const tbody = document.getElementById('logs-body');
            tbody.innerHTML = '';
            
            if(rows.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3">No logs available</td></tr>';
                return;
            }

            rows.forEach(row => {
                const tr = document.createElement('tr');
                // Format the timestamp nicely
                const time = new Date(row.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                tr.innerHTML = `
                    <td>${time}</td>
                    <td>${row.total_pages}</td>
                    <td>₹${row.total_cost.toFixed(2)}</td>
                `;
                tbody.appendChild(tr);
            });
        });

        socket.on('ui_error', (msg) => {
            alert(msg);
            document.getElementById('poll-btn').innerText = "Check Status & Sync";
            document.getElementById('poll-btn').disabled = false;
        });

        function pollKiosk() {
            const btn = document.getElementById('poll-btn');
            btn.innerText = "Polling app...";
            btn.disabled = true;
            document.getElementById('sync-status').innerText = "Waiting for kiosk response...";
            
            socket.emit('ui_request_poll', { kioskId: targetKiosk });
            
            // Re-enable button after 5 seconds if kiosk doesn't reply
            setTimeout(() => { btn.disabled = false; btn.innerText = "Check Status & Sync"; }, 5000);
        }
    </script>
</body>
</html>
