<div class="dashboard">
    <div class="card status-card">
        <h2><span id="kiosk-id">Kiosk GGV 01</span> <div id="kiosk-status" class="badge offline">Offline</div></h2>
        <div class="hardware-status">
            <p><strong>Wi-Fi:</strong> <span id="wifi-status">--</span></p>
            <p><strong>Printer:</strong> <span id="printer-status">--</span></p>
        </div>
        <button id="poll-btn" onclick="pollKiosk()">Refresh All Data</button>
    </div>

    <div class="stats-row">
        <div class="card mini-card">
            <h3>Today</h3>
            <p id="today-pages">0 Pages</p>
            <p id="today-rev">₹0.00</p>
        </div>
        <div class="card mini-card">
            <h3>Yesterday</h3>
            <p id="yesterday-pages">0 Pages</p>
            <p id="yesterday-rev">₹0.00</p>
        </div>
    </div>

    <div class="card log-card">
        <h2>History (Date-wise)</h2>
        <table>
            <thead><tr><th>Date</th><th>Pages</th><th>Revenue</th></tr></thead>
            <tbody id="history-body"></tbody>
        </table>
    </div>
</div>

<script>
    const socket = io();
    const targetKiosk = "GGV_KIOSK_01"; // Must match your Flutter kioskId

    socket.on('ui_update', (data) => {
        if (data.kioskId !== targetKiosk) return;

        // 1. Update Status & Hardware
        const statusEl = document.getElementById('kiosk-status');
        statusEl.innerText = data.status;
        statusEl.className = 'badge ' + data.status.toLowerCase();
        
        if(data.hardware) {
            document.getElementById('wifi-status').innerText = data.hardware.wifi;
            document.getElementById('printer-status').innerText = data.hardware.printer;
        }

        // 2. Update Today/Yesterday Stats
        if(data.stats) {
            document.getElementById('today-pages').innerText = `${data.stats.today.pages} Pages`;
            document.getElementById('today-rev').innerText = `₹${data.stats.today.revenue.toFixed(2)}`;
            
            document.getElementById('yesterday-pages').innerText = `${data.stats.yesterday.pages} Pages`;
            document.getElementById('yesterday-rev').innerText = `₹${data.stats.yesterday.revenue.toFixed(2)}`;

            // 3. Update History Table
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = '';
            Object.keys(data.stats.history).sort().reverse().forEach(date => {
                const row = data.stats.history[date];
                tbody.innerHTML += `<tr><td>${date}</td><td>${row.pages}</td><td>₹${row.revenue.toFixed(2)}</td></tr>`;
            });
        }
        
        document.getElementById('poll-btn').innerText = "Refresh All Data";
        document.getElementById('poll-btn').disabled = false;
    });

    function pollKiosk() {
        document.getElementById('poll-btn').innerText = "Fetching from App...";
        document.getElementById('poll-btn').disabled = true;
        socket.emit('ui_request_poll', { kioskId: targetKiosk });
    }
</script>
